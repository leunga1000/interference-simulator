function make_grid(grid_increment, x_max, y_max) {
    grid_increment = grid_increment || 1.0;
    return {grid: [], grid_inc: grid_increment, grid_xmax: x_max, grid_ymax: y_max}
}

function get_grid_location(grid, x, y) {
    console.log(grid);
    grid_inc = grid.grid_inc;
    if (x < 0 || y < 0) {
        return false;
    }
    if (x > grid['grid_xmax'] || y > grid['grid_ymax']) {
        return false;
    }
    const loc_x = x / grid_inc;
    const loc_y = y / grid_inc;
    return [loc_x, loc_y]
}
