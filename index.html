function optimiseCanvas(canvas) {
    // Get the DPR and size of the canvas
    const dpr = window.devicePixelRatio;
    const rect = canvas.getBoundingClientRect();
    let ctx = canvas.getContext("2d");

    // Set the "actual" size of the canvas
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;

    // Scale the context to ensure correct drawing operations
    ctx.scale(dpr, dpr);

    // Set the "drawn" size of the canvas
    canvas.style.width = `${rect.width}px`;
    canvas.style.height = `${rect.height}px`;
}

function create_source(x, y, source_type_in, wavelength, power) {
    const source_pos = {x: x, y: y}; //, z: 0};
    const source_type = source_type_in || 'l'; // or 'r' linear/radial
    if (power) {
        power = power;
    } else if (source_type === 'l') {
        power = 7;
    } else if (source_type === 'r') {
        power = 3;
    }
    let amplitude = power ** 0.5;  // not ^
    let waves = [];
    wavelength = wavelength || 0.15;
    
    let offstage = true; // whether to keep simulating within x (2?) times simulation area.
    SOURCE_COUNT += 1;  // thread safety?
    const source = {pos: source_pos, 
                    source_type: source_type, wavelength: wavelength, 
                    power: power, amplitude: amplitude, id: SOURCE_COUNT}
    return source
}

function get_num_waves(source, grid) {
    // calculate number of waves to put in the
    // simulation from this source.
    //console.log(source);
    const pos = source.pos;
    let bounds = [[0,0], [0, grid.y_max], [grid.x_max, 0], [grid.x_max, grid.y_max]];
    let max_distance = 0.0;
    let min_distance = 0.0;
    for (let bound of bounds) {
        //console.log(bound[0], bound[1], pos.x, pos.y);
        let distance = ((pos.x - bound[0]) ** 2 + (pos.y - bound[1]) ** 2) ** 0.5;
        //console.log(bound, distance, max_distance);
        max_distance = Math.max(distance, max_distance, source.wavelength);
        min_distance = Math.min(distance, min_distance, source.wavelength);
    }
    return {min: Math.floor(min_distance / source.wavelength),
            max: Math.ceil(max_distance / source.wavelength)};  // +1?

    // TODO think this is right for radial, should cover linear with a bit of tweaking
}

function paint_sum(grid, prop_x, prop_y, sum) {
    let threshold = 11;// 10.1;
    //console.assert(`painting ${prop_x}, ${prop_y}, ${sum}` === 'painting 1, 3, 7.000000000000001'); // TODO
    
    // upper left x upper left y, width px, height px
    let x0 = prop_x * grid.grid_inc;
    let y0 = grid.y_max - ((prop_y * grid.grid_inc) + grid.grid_inc);  // position of grid cell, minus grid cell height (y is downwards), then ymax subtract that
    // let grid_scale = get_grid_scale(grid, grid.canvas);
    // let xs = x0 * grid_scale.x_scale;
    // let ys = y0 * grid_scale.y_scale;
    let xs = x0 * grid.scale;
    let ys = y0 * grid.scale;
    let width = grid.grid_inc * grid.scale; //TODO optimise
    let height = grid.grid_inc * grid.scale;
    let out_str = '';
    if (sum > threshold) {
        // console.log(`painting ${prop_x}, ${prop_y}, ${sum}, ${grid.grid_inc}`);
        console.log(`painting ${x0}, ${y0}, ${sum}, ${grid.grid_inc}, ${width}, ${height}, ${xs}, ${ys}, ${grid.scale}`);
        // ctx2.fillRect(xs, ys, width, height); // upper left x upper left y, width px, height px
        grid.ctx.globalAlpha = 0.5;
        grid.ctx.fillStyle = 'red';
        width = Math.max(width, 1)
        height = Math.max(height, 1)
        grid.ctx.fillRect(xs, ys, width, height); // upper left x upper left y, width px, height px
        grid.ctx.globalAlpha = 1;
        if (grid.ctxSum) {
            //grid.ctxSum.fillRect(xs, ys, width, height);
            grid.ctxSum.beginPath();
            // TODO grad
            grid.ctxSum.arc(xs, ys, 1, 0, 2 * Math.PI);
            grid.ctxSum.stroke();
        }
        // ctx2.fillRect(0, 0, prop_x * grid.grid_inc, prop_y * grid.grid_inc); // xmin ymin xmax ymax
    }
    else {
        out_str = `O painting ${x0}, ${y0}, ${sum}, ${grid.grid_inc}, ${width}, ${height}, ${xs}, ${ys}, ${grid.scale}`;
        
    }
    //console.log(out_str);
}

function _total_up_grid(grid, linear_or_squares) {
    let grid_data = grid.grid;
    for (const prop_x in grid_data) {
        for (const prop_y in grid_data[prop_x] ) {
            let data_point = grid_data[prop_x][prop_y];
            let sum = 0;
            let root_sum = 0;
            // console.log(data_point);
            for (const source_wave_id in data_point) {
                if (source_wave_id === 'sum') {
                    continue;
                }
                let contribution = data_point[source_wave_id];
                // console.log("contribution" + contribution);
                if (linear_or_squares === 'lin') {
                    sum += contribution;
                } else {
                    root_sum += contribution; // OPT memoise
                }
            }

            if (linear_or_squares === 'sq') {
                sum = root_sum ** 2;
                // console.log(`${root_sum}, ${sum}`);
            }
            grid_data[prop_x][prop_y]['sum'] = sum;
            paint_sum(grid, prop_x, prop_y, sum);
        }
    }
    console.log(grid);
}

function get_grid_location(grid, x, y) {
    // console.log(grid);
    grid_inc = grid.grid_inc;
    if (x < 0 || y < 0) {
        return false;
    }
    // if (x > grid['grid_index_xmax'] || y > grid['grid_index_ymax']) {
    if (x > grid.x_max || y > grid.y_max) {
        return false;
    }
    const loc_x = Math.floor(x / grid_inc);
    const loc_y = Math.floor(y / grid_inc);
    
    return [loc_x, loc_y]
}

function _assign_wave(wave_id, source, grid, source_wave_id) {
    // given a wave description, break it into 
    // segments and assign
    let radius = wave_id * source.wavelength;
    let circumference = 2 * Math.PI * radius;
    let num_segments = circumference / (0.2 * grid.grid_inc);   // TODO does it need to be less than grid_inc? - YES
    
    // let angle_increment = 360 / num_segments;
    let angle_increment = 2 * Math.PI / num_segments;
    let angle = 0; // vertical upwards
    for (let i_angle = 0; i_angle <= num_segments; i_angle++) {
        // x, sin theta = o / h  where o is what we're looking for, h is radius.
        // x = h * sin theta
        // x = r * sin theta
        let theta = i_angle * angle_increment;
        let x = radius * Math.sin(theta);
        x = x + source.pos.x;
        // console.log(x);
        // y, cos theta = a / h where a is our y coordinate, h is radius
        // y = r * cos theta
        let y = radius * Math.cos(theta);
        y = source.pos.y + y;
        // console.log(x, y, i_angle, theta, radius, Math.sin(theta), Math.cos(theta));
        _assign_wave_segment(x, y, source.amplitude, grid, source_wave_id);
    }
    
}

function drawSource(x, y, x_width, y_width, ctx, shape, rotate) {
    // rectangles, pluses, minuses, crosses, stars.
    // rectangle rounded corners
    // plus
    let x0 = x - (x_width / 2);
    let x1 = x + (x_width / 2);
    let y0 = y - (y_width / 2);
    let y1 = y + (y_width / 2);

    if (rotate) {
        ctx.translate(x, y);
        ctx.rotate(2 * Math.PI * rotate/360);
        ctx.translate(-x, -y);
    }

    if (shape === 'plus') {
        ctx.beginPath();
        ctx.moveTo(x, y1);
        ctx.lineTo(x, y0);
        ctx.moveTo(x0, y);
        ctx.lineTo(x1, y);
        ctx.stroke();
    }
    else if (shape === 'rect'){
    
        // rectangle
        // ctx.fillStyle = "red";
        ctx.fillStyle = "black";
        ctx.fillRect(x0, y0, x_width, y_width);
    }
    else if (shape === '3star'){
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x, y0);
        ctx.moveTo(x, y);
        ctx.stroke();
        ctx.translate(x, y);
        ctx.rotate(2 * Math.PI * 120 / 360);
        ctx.translate(-x, -y);
        ctx.moveTo(x, y);
        ctx.lineTo(x, y0);
        ctx.stroke();
        ctx.moveTo(x, y);
        ctx.translate(x, y);
        ctx.rotate(2 * Math.PI * 120 / 360);
        ctx.translate(-x, -y);
        ctx.moveTo(x, y);
        ctx.lineTo(x, y0);
        ctx.moveTo(x, y);
        //ctx.moveTo(x0, y);
        //ctx.lineTo(x1, y);
        ctx.stroke();
    
    }

    if (rotate) {
      ctx.resetTransform();
    }

    
    
}

function get_next_source_pos(source, ts_interval, source_path) {
    let to_x = source.pos.x - source_path.x;
    let to_y = source.pos.y - source_path.y;
    let gradient = to_y/to_x;
    let dist = source_path.speed_ms * ts_interval;
    // let gradient = dy/dx
    // let dist ** 2 = (dx ** 2 + dy ** 2) 
    // let dist ** 2 = (dx ** 2 + (gradient * dx) ** 2)
    // let dist ** 2 = (1 + gradient) * dx ** 2
    // let (dist ** 2) / (1 + gradient) = dx ** 2;
    let dx = ((dist ** 2) / (1 + gradient) ) ** 0.5;
    let dy = gradient * dx;
    let next_x = source.pos.x + dx;
    let next_y = source.pos.y + dy;
    return {next_x, next_y}
}
